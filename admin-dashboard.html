<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style> #map {position:absolute; top: 0; bottom: 0; left: 0; right:0;}</style>
  <title>LGU Command Center - Marooner's Map</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .bg-brand-dark { background-color: #3B5B47; }
    .bg-brand-light { background-color: #95D3A2; }
    .text-brand-light { color: #95D3A2; }
    .text-brand-dark { color: #3B5B47; }
    .bg-map-light { background-color: #EAF4FB; }
    .queue-scroll::-webkit-scrollbar { width: 6px; }
    .queue-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    .queue-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .queue-scroll::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
  </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 min-h-screen md:h-screen w-full flex flex-col md:flex-row overflow-x-hidden md:overflow-hidden m-0 p-0">

  <div class="flex flex-row md:flex-col w-full md:w-24 h-16 md:h-full bg-[#263D2F] items-center px-4 md:px-0 py-0 md:py-6 justify-between md:rounded-r-3xl z-20 shadow-md md:shadow-2xl flex-shrink-0 border-b md:border-b-0 md:border-r border-[#95D3A2]/20">
    <div class="flex flex-row md:flex-col space-x-4 md:space-x-0 md:space-y-8 items-center">
      <a href="admin-dashboard.html" class="w-10 h-10 md:w-14 md:h-14 bg-red-600 rounded-full flex items-center justify-center shadow-lg md:mb-2 transition transform hover:scale-105 border-2 border-white/20">
        <svg class="w-5 h-5 md:w-7 md:h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
      </a>
      <a href="admin-sms-list.html" class="w-10 h-10 md:w-12 md:h-12 bg-[#95D3A2]/20 rounded-xl flex items-center justify-center text-brand-light cursor-pointer transition shadow-inner border border-[#95D3A2]/30">
        <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"></path></svg>
      </a>
    </div>
    <a href="index.html" class="w-10 h-10 hover:bg-red-500/20 rounded-xl flex items-center justify-center text-red-400 hover:text-red-500 cursor-pointer ml-auto md:ml-0 md:mt-auto transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
    </a>
  </div>

  <div class="flex-1 flex flex-col p-4 md:p-6 overflow-y-auto md:overflow-hidden relative">
    
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
      <div>
        <div class="flex items-center gap-3">
          <h1 class="text-xl md:text-2xl font-bold text-gray-900 uppercase tracking-wide">LGU Command Center</h1>
          <span class="hidden md:inline-block bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-widest border border-blue-200">Miagao District</span>
        </div>
        <p class="text-sm text-gray-500 mt-1 font-medium">Monitoring Web and SMS Gateway influx.</p>
      </div>

      <div class="flex items-center gap-5">
        <div class="flex gap-3">
          <button class="bg-white border border-gray-200 text-gray-700 text-xs md:text-sm font-bold px-3 md:px-4 py-2 rounded-lg shadow-sm hover:bg-gray-50 transition flex items-center gap-2">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            <span class="hidden md:inline">Sync Gateway</span>
            <span class="md:hidden">Sync</span>
          </button>
          <button class="bg-red-600 hover:bg-red-700 text-white text-xs md:text-sm font-bold px-3 md:px-4 py-2 rounded-lg shadow-md transition flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"></path></svg>
            <span class="hidden md:inline">Broadcast Alert</span>
            <span class="md:hidden">Alert</span>
          </button>
        </div>
        <div class="hidden md:block h-8 w-px bg-gray-300"></div>
        <div class="hidden md:flex items-center gap-3">
          <div class="w-10 h-10 bg-[#3B5B47] text-[#95D3A2] rounded-full flex items-center justify-center font-bold shadow-md border-2 border-white">AD</div>
          <div>
            <p class="text-sm font-bold text-gray-800 leading-none">Admin</p>
            <p class="text-xs text-gray-500 font-medium mt-1">LGU Official</p>
          </div>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 shrink-0">
      <div class="bg-white rounded-xl p-4 shadow-sm border border-l-4 border-l-red-500 flex flex-col">
        <span class="text-[10px] md:text-xs text-gray-500 font-bold uppercase tracking-wider mb-1">Pending SOS</span>
        <span id="statSOS" class="text-2xl md:text-3xl font-extrabold text-gray-900">0</span>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm border border-l-4 border-l-yellow-500 flex flex-col">
        <span class="text-[10px] md:text-xs text-gray-500 font-bold uppercase tracking-wider mb-1">Pending Hazard</span>
        <span id="statHazard" class="text-2xl md:text-3xl font-extrabold text-gray-900">0</span>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm border border-l-4 border-l-blue-500 flex flex-col">
        <span class="text-[10px] md:text-xs text-gray-500 font-bold uppercase tracking-wider mb-1">Units Dispatched</span>
        <span id="statDispatched" class="text-2xl md:text-3xl font-extrabold text-gray-900">0</span>
      </div>
      <div class="bg-[#3B5B47] text-white rounded-xl p-4 shadow-md flex flex-col justify-center">
        <span class="text-[10px] md:text-xs text-[#95D3A2] font-bold uppercase tracking-wider mb-1">Resolved Today</span>
        <span id="statResolved" class="text-2xl md:text-3xl font-extrabold">0</span>
      </div>
    </div>

    <div class="flex-1 flex flex-col lg:flex-row gap-6 min-h-0">
      
      <div class="lg:w-7/12 bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col overflow-hidden min-h-[300px]">
        <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
          <h2 class="font-bold text-gray-800 flex items-center gap-2">
            <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
            Live Map
          </h2>
        </div>
        <div class="flex-1 bg-map-light relative overflow-hidden flex items-center justify-center">
          <div id="map">
            <script>
              var map = L.map('map').setView([10.6410, 122.2355], 13);
              L.tileLayer('https://api.maptiler.com/maps/streets-v4/{z}/{x}/{y}.png?key=pxJ2FnvFl8J48s3zwqMi',
              {attribution:'<a href="https://www.maptiler.com/copyright/" target="_blank">&copy; MapTiler</a>'}).addTo(map);
            </script>
          </div>
        </div>
      </div>

      <div class="lg:w-5/12 bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col overflow-hidden min-h-[300px]">
        <div class="pt-4 px-4 border-b border-gray-100 flex flex-col bg-gray-50 gap-4">
          <div class="flex justify-between items-center">
            <h2 class="font-bold text-gray-800 flex items-center gap-2">
              <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
              Incident Queue
            </h2>
            <span id="queueTotalBadge" class="bg-red-100 text-red-600 text-xs font-bold px-2 py-0.5 rounded-full">0 Total</span>
          </div>
          
          <div class="flex gap-4" id="filterTabs">
            <button data-filter="All" class="filter-tab pb-2 text-sm font-bold border-b-2 border-[#3B5B47] text-[#3B5B47] transition">All</button>
            <button data-filter="Reported" class="filter-tab pb-2 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-800 transition">Reported</button>
            <button data-filter="Dispatched" class="filter-tab pb-2 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-800 transition">Dispatched</button>
            <button data-filter="Resolved" class="filter-tab pb-2 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-800 transition">Resolved</button>
          </div>
        </div>

        <div class="flex-1 overflow-y-auto queue-scroll p-4 space-y-3" id="queueContainer">
          </div>
      </div>
    </div>
  </div>

  <div id="toast" class="fixed bottom-6 right-6 bg-[#3B5B47] text-[#95D3A2] px-6 py-3 rounded-xl shadow-2xl font-bold flex items-center gap-3 transform translate-y-20 opacity-0 transition duration-300 z-50">
    <svg id="toastIcon" class="w-5 h-5 text-[#95D3A2]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
    <span id="toastMsg">Status Updated</span>
  </div>

  <script>
    function showToast(message, isDelete = false) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMsg');
      const toastIcon = document.getElementById('toastIcon');

      toastMsg.innerText = message;

      if(isDelete) {
        toast.className = "fixed bottom-6 right-6 bg-red-600 text-white px-6 py-3 rounded-xl shadow-2xl font-bold flex items-center gap-3 transform transition duration-300 z-50";
        toastIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>`;
      } else {
        toast.className = "fixed bottom-6 right-6 bg-[#3B5B47] text-[#95D3A2] px-6 py-3 rounded-xl shadow-2xl font-bold flex items-center gap-3 transform transition duration-300 z-50";
        toastIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>`;
      }

      toast.classList.remove('translate-y-20', 'opacity-0');
      setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 3000);
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDCMWPvDEKEGWYiyL8ozobe778o1ZbudHY",
      authDomain: "marooner-s-map-9bd81.firebaseapp.com",
      projectId: "marooner-s-map-9bd81",
      storageBucket: "marooner-s-map-9bd81.firebasestorage.app",
      messagingSenderId: "630717954342",
      appId: "1:630717954342:web:d83fcde58c2a7efd8129e7",
      measurementId: "G-DWJKH47FPM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const createIcon = (color) => new L.Icon({
        iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34]
    });

    let adminMarkers = []; 
    let allReportsData = []; 
    let currentFilter = "All";

    // Tab Filter Logic
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        // Update tab visuals
        document.querySelectorAll('.filter-tab').forEach(t => {
          t.classList.remove('border-[#3B5B47]', 'text-[#3B5B47]', 'font-bold');
          t.classList.add('border-transparent', 'text-gray-500', 'font-semibold');
        });
        e.target.classList.remove('border-transparent', 'text-gray-500', 'font-semibold');
        e.target.classList.add('border-[#3B5B47]', 'text-[#3B5B47]', 'font-bold');

        currentFilter = e.target.dataset.filter;
        renderQueue(); // Re-draw list based on new filter
      });
    });

    onSnapshot(collection(db, "reports"), (snapshot) => {
      allReportsData = [];
      let pendingSOS = 0, pendingHazard = 0, dispatched = 0, resolved = 0;

      adminMarkers.forEach(m => map.removeLayer(m));
      adminMarkers = [];

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const type = data.type || "Info";
        const status = data.status || "Reported";
        const title = data.title || "Untitled";

        // Save for filtering
        allReportsData.push({ id: docSnap.id, data: data, type, status, title });

        // Calculate Analytics
        if (status === "Resolved" || status === "Cleared by LGU") resolved++;
        else if (status === "Dispatched" || status === "In Progress") dispatched++;
        else {
          if (type.includes("SOS")) pendingSOS++;
          if (type.includes("Hazard")) pendingHazard++;
        }

        // Draw Map Pins
        if (data.lat && data.lng) {
          let icon = createIcon('blue');
          if (type.includes("SOS")) icon = createIcon('red');
          else if (type.includes("Hazard")) icon = createIcon('yellow');

          const marker = L.marker([data.lat, data.lng], {icon}).addTo(map)
            .bindPopup(`<b class="uppercase text-xs text-gray-500">${type}</b><br><strong class="text-sm">${title}</strong><br><i class="text-xs">${status}</i>`);
          adminMarkers.push(marker);
        }
      });

      // Update Statistic Cards
      document.getElementById('statSOS').textContent = pendingSOS;
      document.getElementById('statHazard').textContent = pendingHazard;
      document.getElementById('statDispatched').textContent = dispatched;
      document.getElementById('statResolved').textContent = resolved;

      renderQueue(); 
    });

    function renderQueue() {
      const queueContainer = document.getElementById('queueContainer');
      queueContainer.innerHTML = '';
      let filteredCount = 0;

      allReportsData.forEach(report => {
        // Check Filter condition
        if (currentFilter !== "All" && report.status !== currentFilter) return;
        
        filteredCount++;
        let typeColor = "bg-blue-500", borderColor = "border-blue-200", bgTint = "bg-blue-50/30";
        if (report.type.includes("SOS")) { typeColor = "bg-red-500"; borderColor = "border-red-200"; bgTint = "bg-red-50/30"; }
        else if (report.type.includes("Hazard")) { typeColor = "bg-yellow-500"; borderColor = "border-yellow-200"; bgTint = "bg-yellow-50/30"; }

        const queueHtml = `
          <div class="queue-item border ${borderColor} ${bgTint} rounded-xl p-4 flex flex-col gap-3 transition">
            <div class="flex justify-between items-start">
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <span class="${typeColor} text-white text-[9px] font-bold px-1.5 py-0.5 rounded uppercase">${report.type}</span>
                  <span class="text-xs text-gray-500 font-semibold flex items-center gap-1">Web App</span>
                </div>
                <h3 class="font-bold text-gray-900 text-sm">"${report.title}"</h3>
                <p class="text-xs text-gray-500 mt-1">Loc: ${report.data.location || 'See Map Pin'} | <span class="text-blue-600 font-semibold">${report.data.reportedBy || 'Anonymous'}</span></p>
              </div>
            </div>
            <div class="flex items-center gap-3 mt-1">
              <select onchange="updateStatusDb(this, '${report.id}')" class="bg-white border border-gray-300 text-gray-700 text-xs font-bold rounded-lg px-2 py-1.5 focus:outline-none focus:border-blue-500 shadow-sm cursor-pointer w-32">
                <option value="Reported" ${report.status==='Reported'?'selected':''}>🚨 Reported</option>
                <option value="Dispatched" ${report.status==='Dispatched'?'selected':''}>🚓 Dispatched</option>
                <option value="Resolved" ${report.status==='Resolved'?'selected':''}>✅ Resolved</option>
              </select>
              <button onclick="removeReportDb(this, '${report.id}')" class="text-xs text-red-500 font-bold hover:text-red-700 transition flex items-center gap-1 ml-auto">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                Remove
              </button>
            </div>
          </div>`;
        queueContainer.insertAdjacentHTML('afterbegin', queueHtml);
      });

      document.getElementById('queueTotalBadge').textContent = `${filteredCount} Items`;
    }

    // Global Functions for the HTML Event Listeners
    window.updateStatusDb = async (selectElement, docId) => {
      const newVal = selectElement.value;
      await updateDoc(doc(db, "reports", docId), { status: newVal });
      showToast(`Report updated to ${newVal.toUpperCase()}`, false);
    };

    window.removeReportDb = async (btnElement, docId) => {
      if(confirm("Permanently delete this report from the database? Users will no longer see it.")) {
        await deleteDoc(doc(db, "reports", docId));
        showToast("Report permanently removed.", true);
      }
    };
  </script>
</body>
</html>
