<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LGU Command Center - Reports List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom brand colors */
    .bg-brand-dark { background-color: #3B5B47; }
    .bg-brand-light { background-color: #95D3A2; }
    .text-brand-light { color: #95D3A2; }
    .text-brand-dark { color: #3B5B47; }
  </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 h-screen w-screen flex overflow-hidden m-0 p-0">

  <div class="hidden md:flex w-24 bg-[#263D2F] flex-col items-center py-6 justify-between rounded-r-3xl z-20 shadow-2xl h-full flex-shrink-0 border-r border-[#95D3A2]/20">
    <div class="space-y-8 flex flex-col items-center w-full">
      <a href="admin-dashboard.html" class="w-10 h-10 hover:bg-white/10 rounded-xl flex items-center justify-center text-white/50 hover:text-white cursor-pointer transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
      </a>
      
      <a href="admin-sms-list.html" class="w-14 h-14 bg-red-600 rounded-xl flex items-center justify-center text-white shadow-lg mb-2 transition transform hover:scale-105 border-2 border-white/20">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"></path></svg>
      </a>

    </div>
    
    <a href="index.html" class="w-10 h-10 hover:bg-red-500/20 rounded-xl flex items-center justify-center text-red-400 hover:text-red-500 cursor-pointer mt-auto transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
    </a>
  </div>

  <div class="flex-1 flex flex-col h-full w-full p-6 overflow-hidden relative">
    
    <div class="flex justify-between items-center mb-6">
      <div>
        <div class="flex items-center gap-3">
          <h1 class="text-2xl font-bold text-gray-900 uppercase tracking-wide">Incident Reports</h1>
          <span class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-widest border border-blue-200">Miagao District</span>
        </div>
        <p class="text-sm text-gray-500 mt-1 font-medium">Master list of all recorded incidents and hazard reports.</p>
      </div>

      <div class="flex items-center gap-5">
        <div class="flex gap-3">
          <button class="bg-white border border-gray-200 text-gray-700 text-sm font-bold px-4 py-2 rounded-lg shadow-sm hover:bg-gray-50 transition flex items-center gap-2">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            Export Data
          </button>
        </div>

        <div class="h-8 w-px bg-gray-300"></div>

        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-[#3B5B47] text-[#95D3A2] rounded-full flex items-center justify-center font-bold shadow-md border-2 border-white">
            AD
          </div>
          <div class="hidden md:block">
            <p class="text-sm font-bold text-gray-800 leading-none">Admin</p>
            <p class="text-xs text-gray-500 font-medium mt-1">LGU Official</p>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col flex-1 overflow-hidden">
      <div class="overflow-x-auto h-full">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50 sticky top-0">
            <tr>
              <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                Phone Number
              </th>
              <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                CODE/Type
              </th>
              <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                Location
              </th>
              <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                Description
              </th>
              <th scope="col" class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                Raw Message
              </th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-gray-200">
            <tr>
              <td colspan="5" class="px-6 py-12 text-center text-sm text-gray-500">
                <div class="flex flex-col items-center justify-center">
                  <svg class="w-12 h-12 text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                  <p class="font-medium text-gray-600">No reports available</p>
                  <p class="text-xs text-gray-400 mt-1">Incoming incidents and hazards will populate here.</p>
                </div>
              </td>
            </tr>
            </tbody>
        </table>
      </div>
    </div>

  </div>

</body>
</html>
