<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Marooner's Map</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom brand colors */
    .bg-brand-dark { background-color: #3B5B47; }
    .bg-brand-light { background-color: #95D3A2; }
    .text-brand-light { color: #95D3A2; }
    .text-brand-dark { color: #3B5B47; }
    .bg-brand-button { background-color: #527A5F; }
    .bg-brand-button-hover { background-color: #639272; }
    .bg-map-light { background-color: #EAF4FB; }
    
    /* Custom Select Arrow Styling */
    select {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%239ca3af' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 0.5rem center;
      background-repeat: no-repeat;
      background-size: 1.25em 1.25em;
    }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 h-screen w-screen flex overflow-hidden m-0 p-0">

  <div class="hidden md:flex w-24 bg-brand-dark flex-col items-center py-6 justify-between rounded-r-3xl z-20 shadow-2xl h-full flex-shrink-0">
    <div class="space-y-8 flex flex-col items-center w-full">
      <a href="main.html" class="w-14 h-14 bg-brand-light rounded-full flex items-center justify-center shadow-lg mb-2 transition transform hover:scale-105">
        <svg class="w-8 h-8 text-[#3B5B47]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
      </a>
      
      <a href="main.html" class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center text-brand-light cursor-pointer transition shadow-inner">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
      </a>
      
      <a href="analytics.html" class="w-10 h-10 hover:bg-white/10 rounded-full flex items-center justify-center text-white/50 hover:text-white cursor-pointer transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
      </a>
      
      <a href="reportslist.html" class="w-10 h-10 hover:bg-white/10 rounded-full flex items-center justify-center text-white/50 hover:text-white cursor-pointer transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
      </a>
      
      <a href="profile.html" class="w-10 h-10 hover:bg-white/10 rounded-full flex items-center justify-center text-white/50 hover:text-white cursor-pointer transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
      </a>
    </div>
    
    <a href="profile.html" class="w-10 h-10 bg-brand-light rounded-full flex items-center justify-center shadow-md cursor-pointer mt-auto text-brand-dark font-bold text-sm hover:scale-105 transition">
      JD
    </a>
  </div>

  <div class="flex-1 flex flex-col h-full w-full p-6 md:p-8 overflow-y-auto relative">
    
    <div class="flex justify-between items-start mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-900 flex items-center">
          Hello, Juan Dela Cruz! <span class="ml-2 text-2xl">👋</span>
        </h1>
        <p class="text-sm text-gray-400 mt-1 font-medium">Anything to report?</p>
      </div>
      <div class="bg-green-100 text-green-600 text-xs font-bold px-3 py-1.5 rounded-full flex items-center shadow-sm border border-green-200">
        <span class="w-2 h-2 rounded-full bg-green-500 mr-2 animate-pulse"></span>
        Real-time monitoring active
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-6 flex flex-col lg:flex-row gap-4 items-end lg:items-center w-full z-10">
      
      <div class="flex-1 w-full">
        <label class="block text-xs font-semibold text-gray-400 mb-1">Region</label>
        <select id="regionSelect" class="w-full bg-transparent border-b border-gray-200 text-sm font-medium text-gray-700 pb-2 focus:outline-none focus:border-brand-light appearance-none cursor-pointer">
          <option value="" disabled selected>Select Region</option>
        </select>
      </div>

      <div class="flex-1 w-full">
        <label class="block text-xs font-semibold text-gray-400 mb-1">Province</label>
        <select id="provinceSelect" disabled class="w-full bg-transparent border-b border-gray-200 text-sm font-medium text-gray-700 pb-2 focus:outline-none focus:border-brand-light appearance-none disabled:opacity-50 cursor-pointer">
          <option value="" disabled selected>Select Province</option>
        </select>
      </div>

      <div class="flex-1 w-full">
        <label class="block text-xs font-semibold text-gray-400 mb-1">City/Municipality</label>
        <select id="citySelect" disabled class="w-full bg-transparent border-b border-gray-200 text-sm font-medium text-gray-700 pb-2 focus:outline-none focus:border-brand-light appearance-none disabled:opacity-50 cursor-pointer">
          <option value="" disabled selected>Select City</option>
        </select>
      </div>

      <div class="flex-1 w-full">
        <label class="block text-xs font-semibold text-gray-400 mb-1">Data Mode</label>
        <select class="w-full bg-transparent border-b border-gray-200 text-sm font-medium text-gray-700 pb-2 focus:outline-none focus:border-brand-light appearance-none cursor-pointer">
          <option>Real-Time</option>
          <option>Historical</option>
        </select>
      </div>

      <div class="flex-1 w-full">
        <label class="block text-xs font-semibold text-gray-400 mb-1">Time Period</label>
        <select class="w-full bg-transparent border-b border-gray-200 text-sm font-medium text-gray-700 pb-2 focus:outline-none focus:border-brand-light appearance-none cursor-pointer">
          <option>Today</option>
          <option>This Week</option>
          <option>This Month</option>
        </select>
      </div>

      <button class="w-full lg:w-auto bg-[#4CBA6B] hover:bg-[#3ea057] text-white text-sm font-semibold py-2.5 px-6 rounded-lg transition shadow-md flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
        Apply Filter
      </button>
    </div>

    <div class="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-6 min-h-0">
      
      <div class="lg:col-span-2 bg-map-light rounded-[2rem] shadow-inner border border-blue-50 relative flex items-center justify-center min-h-[400px] overflow-hidden group">
        
        <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#3B5B47 1px, transparent 1px); background-size: 30px 30px;"></div>
        
        <div class="relative z-10 w-24 h-24 transform transition duration-500 group-hover:-translate-y-2">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 0C15.163 0 8 7.163 8 16c0 10.375 16 32 16 32s16-21.625 16-32c0-8.837-7.163-16-16-16z" fill="#34A853"/>
            <path d="M24 0C15.163 0 8 7.163 8 16c0 2.215.452 4.325 1.258 6.25l14.742 14.742L38.742 22.25C39.548 20.325 40 18.215 40 16c0-8.837-7.163-16-16-16z" fill="#FBBC05"/>
            <path d="M24 0C15.163 0 8 7.163 8 16c0 2.215.452 4.325 1.258 6.25L24 37V0z" fill="#EA4335"/>
            <path d="M24 0v37l14.742-14.75C39.548 20.325 40 18.215 40 16c0-8.837-7.163-16-16-16z" fill="#4285F4"/>
            <circle cx="24" cy="16" r="7" fill="white"/>
          </svg>
          <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-8 h-2 bg-black/20 blur-sm rounded-[100%]"></div>
        </div>

        <button onclick="document.getElementById('reportModal').classList.remove('hidden')" class="absolute bottom-6 right-6 bg-[#2d4a3e] hover:bg-[#3B5B47] text-[#95D3A2] px-6 py-3 rounded-full shadow-2xl font-bold flex items-center gap-2 transition transform hover:scale-105 border border-[#95D3A2]/30 z-20">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          Add Report
        </button>
      </div>

      <div class="flex flex-col gap-6">
        
        <div class="bg-[#3B5B47] rounded-[1.5rem] p-6 shadow-lg flex flex-col justify-between h-full min-h-[160px] relative overflow-hidden text-white">
          <div class="flex justify-between items-start">
            <span class="text-sm font-medium opacity-80">Resolved Issues</span>
            <span class="bg-brand-light/20 text-brand-light text-xs font-bold px-3 py-1 rounded-full border border-[#95D3A2]/30">optimal</span>
          </div>
          <div class="mt-4">
            <h2 class="text-4xl font-bold tracking-tight">342 <span class="text-sm font-normal opacity-80 ml-1">cleared</span></h2>
          </div>
          <div class="flex justify-between items-end mt-2">
            <span class="text-xs opacity-60">In the last 24 hours</span>
            <span class="text-green-300 text-xs font-semibold flex items-center">
              <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
              +12.4%
            </span>
          </div>
        </div>

        <a href="reportslist.html" class="bg-gradient-to-br from-red-600 to-[#7D1D1D] rounded-[1.5rem] p-6 shadow-xl h-full min-h-[160px] relative overflow-hidden flex items-center cursor-pointer transform transition hover:-translate-y-1 block">
          <div class="bg-gradient-to-t from-white/10 to-white/90 w-20 h-20 rounded-2xl flex items-center justify-center mr-5 shadow-inner backdrop-blur-sm">
             <svg class="w-10 h-10 drop-shadow-md" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2Z" fill="#D32F2F"/></svg>
          </div>
          <div>
            <h3 class="text-white font-bold text-lg leading-tight mb-1">SOS/Hotline Requests</h3>
            <p class="text-red-100 text-sm font-medium opacity-90">High priority rescue & emergency dispatches</p>
          </div>
        </a>

        <a href="reportslist.html" class="bg-gradient-to-br from-[#EAB308] to-[#A16207] rounded-[1.5rem] p-6 shadow-xl h-full min-h-[160px] relative overflow-hidden flex items-center cursor-pointer transform transition hover:-translate-y-1 block">
          <div class="bg-gradient-to-t from-white/10 to-white/90 w-20 h-20 rounded-2xl flex items-center justify-center mr-5 shadow-inner backdrop-blur-sm">
             <svg class="w-10 h-10 drop-shadow-md" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2Z" fill="#4285F4"/></svg>
          </div>
          <div>
            <h3 class="text-white font-bold text-lg leading-tight mb-1">Hazard Reports</h3>
            <p class="text-yellow-100 text-sm font-medium opacity-90">Infrastructure damage & public safety risks</p>
          </div>
        </a>

      </div>
    </div>
  </div>

  <div id="reportModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-2xl p-8 shadow-2xl relative">
      
      <button onclick="document.getElementById('reportModal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>

      <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 bg-red-100 text-red-600 rounded-full flex items-center justify-center font-bold shadow-inner">📍</div>
        <h2 class="text-2xl font-bold text-gray-800">New Map Report</h2>
      </div>

      <form>
        <div class="mb-4">
          <label class="block text-sm font-bold text-gray-700 mb-2">Report Title</label>
          <input type="text" placeholder="e.g. Fallen Electric Post" class="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-xl px-4 py-3 focus:outline-none focus:border-[#3B5B47] focus:ring-1 focus:ring-[#3B5B47] transition">
        </div>

        <div class="mb-6">
          <label class="block text-sm font-bold text-gray-700 mb-2">Description</label>
          <textarea rows="4" placeholder="Describe the hazard or emergency..." class="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-xl px-4 py-3 focus:outline-none focus:border-[#3B5B47] focus:ring-1 focus:ring-[#3B5B47] transition resize-none"></textarea>
        </div>

        <button type="button" onclick="document.getElementById('reportModal').classList.add('hidden')" class="w-full bg-[#3B5B47] hover:bg-[#2d4a3e] text-[#95D3A2] font-bold rounded-xl px-4 py-3.5 transition shadow-lg flex justify-center items-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
          Pin to Map
        </button>
      </form>
    </div>
  </div>

  <script>
    const phLocations = {
      "NCR (National Capital Region)": {
        "Metro Manila": ["Caloocan", "Las Piñas", "Makati", "Malabon", "Mandaluyong", "Manila", "Marikina", "Muntinlupa", "Navotas", "Parañaque", "Pasay", "Pasig", "Pateros", "Quezon City", "San Juan", "Taguig", "Valenzuela"]
      },
      "CAR (Cordillera Administrative Region)": {
        "Abra": ["Bangued", "Boliney", "Bucay", "Sallapadan"],
        "Benguet": ["Baguio City", "La Trinidad", "Itogon"],
        "Ifugao": ["Banaue", "Lagawe", "Mayoyao"]
      },
      "Region I (Ilocos Region)": {
        "Ilocos Norte": ["Laoag", "Batac", "Pagudpud"],
        "Ilocos Sur": ["Vigan", "Candon", "Narvacan"],
        "La Union": ["San Fernando", "Bauang", "Agoo"],
        "Pangasinan": ["Dagupan", "Alaminos", "Urdaneta", "Lingayen"]
      },
      "Region II (Cagayan Valley)": {
        "Cagayan": ["Tuguegarao", "Aparri", "Santa Ana"],
        "Isabela": ["Ilagan", "Cauayan", "Santiago"]
      },
      "Region III (Central Luzon)": {
        "Bulacan": ["Malolos", "Meycauayan", "San Jose del Monte", "Bocaue"],
        "Pampanga": ["San Fernando", "Angeles", "Mabalacat", "Clark"],
        "Tarlac": ["Tarlac City", "Capas", "Concepcion"],
        "Zambales": ["Olongapo", "Iba", "Subic"]
      },
      "Region IV-A (CALABARZON)": {
        "Batangas": ["Batangas City", "Lipa", "Tanauan"],
        "Cavite": ["Dasmariñas", "Bacoor", "Tagaytay", "Imus"],
        "Laguna": ["Calamba", "San Pablo", "Santa Rosa", "Los Baños"],
        "Quezon": ["Lucena", "Tayabas", "Sariaya"],
        "Rizal": ["Antipolo", "Cainta", "Taytay"]
      },
      "Region IV-B (MIMAROPA)": {
        "Palawan": ["Puerto Princesa", "Coron", "El Nido"],
        "Oriental Mindoro": ["Calapan", "Puerto Galera"]
      },
      "Region V (Bicol Region)": {
        "Albay": ["Legazpi", "Tabaco", "Ligao"],
        "Camarines Sur": ["Naga", "Iriga", "Pili"]
      },
      "Region VI (Western Visayas)": {
        "Aklan": ["Kalibo", "Lezo", "Banga", "Batan", "Buruanga", "Ibajay", "Makato", "Malay", "Malinao", "Nabas", "New Washington", "Numancia"],
        "Antique": ["San Jose de Buenavista", "Sibalom", "Culasi"],
        "Capiz": ["Roxas City", "Panay", "Sigma"],
        "Iloilo": ["Iloilo City", "Miagao", "Oton", "Passi"],
        "Negros Occidental": ["Bacolod", "Silay", "Talisay", "Kabankalan"],
        "Guimaras": ["Jordan", "Buenavista"]
      },
      "Region VII (Central Visayas)": {
        "Bohol": ["Tagbilaran", "Panglao", "Carmen"],
        "Cebu": ["Cebu City", "Lapu-Lapu", "Mandaue", "Talisay", "Toledo", "Barili"],
        "Siquijor": ["Siquijor", "Larena"]
      },
      "Region VIII (Eastern Visayas)": {
        "Leyte": ["Tacloban", "Ormoc", "Baybay"],
        "Samar": ["Calbayog", "Catbalogan"]
      },
      "Region IX (Zamboanga Peninsula)": {
        "Zamboanga del Sur": ["Zamboanga City", "Pagadian"],
        "Zamboanga del Norte": ["Dipolog", "Dapitan"]
      },
      "Region X (Northern Mindanao)": {
        "Misamis Oriental": ["Cagayan de Oro", "Gingoog"],
        "Lanao del Norte": ["Iligan", "Tubod"]
      },
      "Region XI (Davao Region)": {
        "Davao del Sur": ["Davao City", "Digos"],
        "Davao del Norte": ["Tagum", "Panabo", "Samal"]
      },
      "Region XII (SOCCSKSARGEN)": {
        "South Cotabato": ["General Santos", "Koronadal"],
        "North Cotabato": ["Kidapawan", "Midsayap"]
      },
      "Region XIII (Caraga)": {
        "Agusan del Norte": ["Butuan", "Cabadbaran"],
        "Surigao del Norte": ["Surigao City", "General Luna"]
      },
      "BARMM (Bangsamoro)": {
        "Maguindanao": ["Cotabato City", "Datu Odin Sinsuat"],
        "Lanao del Sur": ["Marawi", "Wao"]
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const regionSelect = document.getElementById('regionSelect');
      const provinceSelect = document.getElementById('provinceSelect');
      const citySelect = document.getElementById('citySelect');

      // Populate Regions
      Object.keys(phLocations).forEach(region => {
        let opt = document.createElement('option');
        opt.value = region;
        opt.textContent = region;
        regionSelect.appendChild(opt);
      });

      // Handle Region Change
      regionSelect.addEventListener('change', function() {
        provinceSelect.innerHTML = '<option value="" disabled selected>Select Province</option>';
        citySelect.innerHTML = '<option value="" disabled selected>Select City</option>';
        citySelect.disabled = true;

        const selectedRegion = this.value;
        if(selectedRegion) {
          const provinces = Object.keys(phLocations[selectedRegion]);
          provinces.forEach(prov => {
            let opt = document.createElement('option');
            opt.value = prov;
            opt.textContent = prov;
            provinceSelect.appendChild(opt);
          });
          provinceSelect.disabled = false;
        }
      });

      // Handle Province Change
      provinceSelect.addEventListener('change', function() {
        citySelect.innerHTML = '<option value="" disabled selected>Select City</option>';
        
        const selectedRegion = regionSelect.value;
        const selectedProvince = this.value;
        
        if(selectedProvince) {
          const cities = phLocations[selectedRegion][selectedProvince];
          cities.forEach(city => {
            let opt = document.createElement('option');
            opt.value = city;
            opt.textContent = city;
            citySelect.appendChild(opt);
          });
          citySelect.disabled = false;
        }
      });
    });
  </script>

</body>
</html>
