<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Marooner's Map</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom colors based on the design */
    .bg-brand-dark { background-color: #3B5B47; }
    .bg-brand-light { background-color: #95D3A2; }
    .text-brand-light { color: #95D3A2; }
    .bg-brand-button { background-color: #527A5F; }
    .bg-brand-button-hover { background-color: #639272; }
  </style>
</head>
<body class="bg-white font-sans text-gray-800 h-screen w-screen flex overflow-hidden m-0 p-0">

  <div class="hidden md:flex w-24 bg-brand-dark flex-col items-center py-6 justify-between rounded-r-3xl z-10 shadow-2xl h-full">
    <div class="space-y-8 flex flex-col items-center w-full">
      <div class="w-14 h-14 bg-brand-light rounded-full flex items-center justify-center shadow-md mb-4">
        <svg class="w-8 h-8 text-[#3B5B47]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
      </div>
      
      <div class="w-10 h-10 bg-brand-light/30 rounded-full flex items-center justify-center text-brand-light cursor-pointer transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
      </div>
      <div class="w-10 h-10 hover:bg-white/10 rounded-full flex items-center justify-center text-white/60 hover:text-white cursor-pointer transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
      </div>
      <div class="w-10 h-10 hover:bg-white/10 rounded-full flex items-center justify-center text-white/60 hover:text-white cursor-pointer transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
      </div>
      <div class="w-10 h-10 hover:bg-white/10 rounded-full flex items-center justify-center text-white/60 hover:text-white cursor-pointer transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
      </div>
    </div>
    
    <div class="w-10 h-10 bg-brand-light rounded-full flex items-center justify-center shadow-md cursor-pointer mt-auto"></div>
  </div>

  <div class="flex-1 flex items-center justify-center p-6 bg-white h-full w-full relative">
    
    <div class="bg-brand-dark w-full max-w-lg rounded-[2rem] p-10 md:p-12 text-white shadow-2xl">
      
      <h1 class="text-3xl md:text-4xl font-bold text-center mb-10 tracking-wide">Marooner's Map</h1>

      <form id="loginForm">
        <div class="mb-5">
          <label class="block text-sm font-bold mb-2 ml-1">Phone Number</label>
          <input type="tel" name="phone" placeholder="+63 9XX XXX XXXX" class="w-full bg-white text-gray-900 rounded-full px-6 py-3.5 focus:outline-none focus:ring-2 focus:ring-[#95D3A2] transition placeholder-gray-400 font-medium">
        </div>
        
        <div class="mb-2">
          <label class="block text-sm font-bold mb-2 ml-1">Password</label>
          <input type="password" name="password" placeholder="Enter your Password" class="w-full bg-white text-gray-900 rounded-full px-6 py-3.5 focus:outline-none focus:ring-2 focus:ring-[#95D3A2] transition placeholder-gray-400 font-medium">
        </div>

        <div class="text-right mb-8">
          <a href="#" class="text-sm text-gray-300 hover:text-white transition">Forgot Password?</a>
        </div>

        <button type="submit" class="w-full bg-brand-button hover:bg-brand-button-hover text-white font-bold rounded-full px-6 py-3.5 mb-4 transition shadow-sm">
          Sign In
        </button>
        
        <button type="button" class="w-full bg-transparent border border-gray-400 hover:bg-white/5 text-white font-bold rounded-full px-6 py-3.5 mb-8 flex items-center justify-center transition">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google Logo" class="w-5 h-5 mr-3">
          or sign in with Google
        </button>
      </form>
      
      <div class="text-center space-y-3">
        <p class="text-sm text-gray-300 font-medium">Don't Have an Account? <a href="signup.html" class="text-brand-light hover:underline ml-1">Sign Up</a></p>
        <p><a href="dashboard.html" class="text-sm text-brand-light font-medium hover:underline">Or Continue Without Logging In</a></p>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getFirestore, 
      collection, 
      query, 
      where, 
      getDocs 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDCMWPvDEKEGWYiyL8ozobe778o1ZbudHY",
      authDomain: "marooner-s-map-9bd81.firebaseapp.com",
      projectId: "marooner-s-map-9bd81",
      storageBucket: "marooner-s-map-9bd81.firebasestorage.app",
      messagingSenderId: "630717954342",
      appId: "1:630717954342:web:d83fcde58c2a7efd8129e7",
      measurementId: "G-DWJKH47FPM"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const phone = document.querySelector('[name="phone"]').value;
      const password = document.querySelector('[name="password"]').value;

      try {
        const usersRef = collection(db, "users");
        const q = query(usersRef, where("phone", "==", phone));
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          alert("No account found with this phone number.");
          return;
        }

        let userFound = false;

        querySnapshot.forEach((doc) => {
          const userData = doc.data();

          if (userData.password === password) {
            userFound = true;

            // Save ALL details to localStorage for the Profile Page
            localStorage.setItem("userLoggedIn", userData.fullname || "User");
            localStorage.setItem("userEmail", userData.email || "");
            localStorage.setItem("userPhone", userData.phone || "");
            localStorage.setItem("userBirthday", userData.birthday || "");
            localStorage.setItem("userRegion", userData.region || "");
            localStorage.setItem("userProvince", userData.province || "");
            localStorage.setItem("userCity", userData.city || "");
            localStorage.setItem("userBarangay", userData.barangay || "");

            alert("Welcome back, " + userData.fullname + "!");
            window.location.href = 'dashboard.html'; 
          }
        });

        if (!userFound) {
          alert("Incorrect password. Please try again.");
        }

      } catch (error) {
        console.error("Login Error: ", error);
        alert("System Error: " + error.message);
      }
    });
  </script>
</body>
</html>
