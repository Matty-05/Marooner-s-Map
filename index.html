<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Marooner's Map</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .bg-brand-dark { background-color: #3B5B47; }
    .bg-brand-light { background-color: #95D3A2; }
    .text-brand-light { color: #95D3A2; }
    .bg-brand-button { background-color: #527A5F; }
    .bg-brand-button-hover { background-color: #639272; }
    #clientPanel, #adminPanel {
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .panel-hidden {
      opacity: 0;
      pointer-events: none;
      position: absolute;
      top: 0; left: 0; right: 0;
      transform: translateY(10px);
    }
    .panel-visible {
      opacity: 1;
      pointer-events: all;
      position: relative;
      transform: translateY(0);
    }
  </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 min-h-screen md:h-screen w-full flex flex-col md:flex-row overflow-x-hidden md:overflow-hidden m-0 p-0">

  <div class="flex flex-row md:flex-col w-full md:w-24 h-16 md:h-full bg-brand-dark items-center px-4 md:px-0 py-0 md:py-6 justify-between md:rounded-r-3xl z-20 shadow-md md:shadow-2xl flex-shrink-0">
    <div class="flex flex-row md:flex-col space-x-4 md:space-x-0 md:space-y-8 items-center">
      <a href="dashboard.html" class="w-14 h-14 bg-brand-light rounded-full flex items-center justify-center shadow-lg mb-2 transition transform hover:scale-105">
        <svg class="w-8 h-8 text-[#3B5B47]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
      </a>
      
      <a href="dashboard.html" class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center text-brand-light cursor-pointer transition shadow-inner">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
      </a>
      
      <a href="analytics.html" class="w-10 h-10 hover:bg-white/10 rounded-full flex items-center justify-center text-white/50 hover:text-white cursor-pointer transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
      </a>
      
      <a href="reportslist.html" class="w-10 h-10 hover:bg-white/10 rounded-full flex items-center justify-center text-white/50 hover:text-white cursor-pointer transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
      </a>
    </div>
    <a href="profile.html" class="w-10 h-10 md:w-14 md:h-14 bg-brand-light rounded-full flex items-center justify-center shadow-lg md:mb-2 transition transform hover:scale-105"></a>
  </div>

  <div class="flex-1 flex items-center justify-center p-6 bg-white h-full w-full relative">
    <div class="bg-brand-dark w-full max-w-lg rounded-[2rem] p-10 md:p-12 text-white shadow-2xl">

      <h1 class="text-3xl md:text-4xl font-bold text-center mb-2 tracking-wide">Marooner's Map</h1>

      <div class="flex justify-center mb-8">
        <div class="flex bg-black/20 rounded-full p-1 gap-1">
          <button id="toggleClient" onclick="switchPanel('client')"
            class="px-5 py-1.5 rounded-full text-sm font-bold transition bg-white text-[#3B5B47] shadow">
            Citizen
          </button>
          <button id="toggleAdmin" onclick="switchPanel('admin')"
            class="px-5 py-1.5 rounded-full text-sm font-bold transition text-white/60 hover:text-white">
            LGU Admin
          </button>
        </div>
      </div>

      <div class="relative" style="min-height: 330px;">

        <div id="clientPanel" class="panel-visible">
          <form id="loginForm">
            <div class="mb-5">
              <label class="block text-sm font-bold mb-2 ml-1">Phone Number</label>
              <input type="tel" name="phone" placeholder="+63 9XX XXX XXXX" value="09123456789"
                class="w-full bg-white text-gray-900 rounded-full px-6 py-3.5 focus:outline-none focus:ring-2 focus:ring-[#95D3A2] transition placeholder-gray-400 font-medium">
            </div>
            <div class="mb-2">
              <label class="block text-sm font-bold mb-2 ml-1">Password</label>
              <input type="password" name="password" placeholder="Enter your Password" value="citizen"
                class="w-full bg-white text-gray-900 rounded-full px-6 py-3.5 focus:outline-none focus:ring-2 focus:ring-[#95D3A2] transition placeholder-gray-400 font-medium">
            </div>
            <div class="text-right mb-4">
              <a href="#" class="text-sm text-gray-300 hover:text-white transition">Forgot Password?</a>
            </div>
            <p id="clientError" class="hidden text-red-300 text-sm text-center mb-3 font-medium bg-red-900/20 rounded-xl px-4 py-2"></p>
            <button type="submit"
              class="w-full bg-brand-button hover:bg-brand-button-hover text-white font-bold rounded-full px-6 py-3.5 mb-4 transition shadow-sm">
              Sign In
            </button>
            <button type="button"
              class="w-full bg-transparent border border-gray-400 hover:bg-white/5 text-white font-bold rounded-full px-6 py-3.5 mb-8 flex items-center justify-center transition">
              <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google Logo" class="w-5 h-5 mr-3">
              or sign in with Google
            </button>
          </form>
          <div class="text-center space-y-3">
            <p class="text-sm text-gray-300 font-medium">Don't Have an Account?
              <a href="signup.html" class="text-brand-light hover:underline ml-1">Sign Up</a>
            </p>
            <p><a href="dashboard.html" class="text-sm text-brand-light font-medium hover:underline">Or Continue Without Logging In</a></p>
          </div>
        </div>

        <div id="adminPanel" class="panel-hidden w-full">
          <div class="flex justify-center mb-4">
            <div class="w-14 h-14 bg-red-600 rounded-2xl flex items-center justify-center shadow-lg border-2 border-white/20">
              <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
              </svg>
            </div>
          </div>
          <p class="text-center text-sm text-[#95D3A2] font-semibold mb-5">LGU Command Center Access</p>

          <form id="adminLoginForm">
            <div class="mb-5">
              <label class="block text-sm font-bold mb-2 ml-1">Admin Username</label>
              <input type="text" name="adminUser" placeholder="Enter admin username" value="admin"
                class="w-full bg-white text-gray-900 rounded-full px-6 py-3.5 focus:outline-none focus:ring-2 focus:ring-red-400 transition placeholder-gray-400 font-medium">
            </div>
            <div class="mb-6">
              <label class="block text-sm font-bold mb-2 ml-1">Admin Password</label>
              <input type="password" name="adminPass" placeholder="Enter admin password" value="admin"
                class="w-full bg-white text-gray-900 rounded-full px-6 py-3.5 focus:outline-none focus:ring-2 focus:ring-red-400 transition placeholder-gray-400 font-medium">
            </div>
            <p id="adminError" class="hidden text-red-300 text-sm text-center mb-3 font-medium bg-red-900/20 rounded-xl px-4 py-2"></p>
            <button type="submit"
              class="w-full bg-red-600 hover:bg-red-700 text-white font-bold rounded-full px-6 py-3.5 mb-4 transition shadow-sm flex items-center justify-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
              </svg>
              Access Command Center
            </button>
          </form>
          <p class="text-center text-xs text-gray-400 mt-3">Admin access is restricted to authorized LGU personnel only.</p>
        </div>

      </div></div>
  </div>

  <script>
    // ─── Panel switcher ────────────────────────────────────────────────────────
    function switchPanel(mode) {
      const c = document.getElementById('clientPanel');
      const a = document.getElementById('adminPanel');
      const tc = document.getElementById('toggleClient');
      const ta = document.getElementById('toggleAdmin');

      const activeBtn   = 'px-5 py-1.5 rounded-full text-sm font-bold transition bg-white text-[#3B5B47] shadow';
      const inactiveBtn = 'px-5 py-1.5 rounded-full text-sm font-bold transition text-white/60 hover:text-white';

      if (mode === 'admin') {
        c.className  = 'panel-hidden w-full';
        a.className  = 'panel-visible w-full';
        ta.className = activeBtn;
        tc.className = inactiveBtn;
      } else {
        a.className  = 'panel-hidden w-full';
        c.className  = 'panel-visible w-full';
        tc.className = activeBtn;
        ta.className = inactiveBtn;
      }
    }

    // Clear all session keys when landing on the login page (handles logout)
    (function clearSession() {
      const keys = [
        'userLoggedIn','userEmail','userPhone','userBirthday',
        'userRegion','userProvince','userCity','userBarangay',
        'adminLoggedIn','adminUsername','adminFullname','accountType'
      ];
      keys.forEach(k => localStorage.removeItem(k));
    })();
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDCMWPvDEKEGWYiyL8ozobe778o1ZbudHY",
      authDomain: "marooner-s-map-9bd81.firebaseapp.com",
      projectId: "marooner-s-map-9bd81",
      storageBucket: "marooner-s-map-9bd81.firebasestorage.app",
      messagingSenderId: "630717954342",
      appId: "1:630717954342:web:d83fcde58c2a7efd8129e7",
      measurementId: "G-DWJKH47FPM"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ─── CITIZEN LOGIN ─────────────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const phone    = e.target.querySelector('[name="phone"]').value.trim();
      const password = e.target.querySelector('[name="password"]').value;
      const errEl    = document.getElementById('clientError');
      errEl.classList.add('hidden');

      if (!phone || !password) {
        errEl.textContent = 'Please fill in both fields.';
        errEl.classList.remove('hidden');
        return;
      }

      // Default Account Check for testing purposes
      if (phone === '09123456789' && password === 'citizen') {
        localStorage.setItem('userLoggedIn', 'Default Citizen');
        localStorage.setItem('userPhone', phone);
        localStorage.setItem('accountType', 'client');
        window.location.href = 'dashboard.html';
        return;
      }

      try {
        const q    = query(collection(db, "users"), where("phone", "==", phone));
        const snap = await getDocs(q);

        if (snap.empty) {
          errEl.textContent = 'No account found with this phone number.';
          errEl.classList.remove('hidden');
          return;
        }

        let found = false;
        snap.forEach((docSnap) => {
          const u = docSnap.data();
          if (u.password === password) {
            found = true;
            localStorage.setItem('userLoggedIn', u.fullname  || 'User');
            localStorage.setItem('userEmail',    u.email     || '');
            localStorage.setItem('userPhone',    u.phone     || '');
            localStorage.setItem('userBirthday', u.birthday  || '');
            localStorage.setItem('userRegion',   u.region    || '');
            localStorage.setItem('userProvince', u.province  || '');
            localStorage.setItem('userCity',     u.city      || '');
            localStorage.setItem('userBarangay', u.barangay  || '');
            localStorage.setItem('accountType',  'client');
            window.location.href = 'dashboard.html';
          }
        });

        if (!found) {
          errEl.textContent = 'Incorrect password. Please try again.';
          errEl.classList.remove('hidden');
        }
      } catch (err) {
        console.error(err);
        errEl.textContent = 'System Error: ' + err.message;
        errEl.classList.remove('hidden');
      }
    });

    // ─── ADMIN LOGIN ───────────────────────────────────────────────────────────
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = e.target.querySelector('[name="adminUser"]').value.trim();
      const password = e.target.querySelector('[name="adminPass"]').value;
      const errEl    = document.getElementById('adminError');
      errEl.classList.add('hidden');

      if (!username || !password) {
        errEl.textContent = 'Please enter your admin credentials.';
        errEl.classList.remove('hidden');
        return;
      }

      // Default Account Check for testing purposes
      if (username === 'admin' && password === 'admin') {
        localStorage.setItem('adminLoggedIn', 'true');
        localStorage.setItem('adminUsername', username);
        localStorage.setItem('adminFullname', 'Default Admin');
        localStorage.setItem('accountType', 'admin');
        window.location.href = 'admin-dashboard.html';
        return;
      }

      try {
        // Admin accounts live in the "admins" Firestore collection
        // Each document: { username, password, fullname }
        const q    = query(collection(db, "admins"), where("username", "==", username));
        const snap = await getDocs(q);

        if (snap.empty) {
          errEl.textContent = 'Admin account not found.';
          errEl.classList.remove('hidden');
          return;
        }

        let found = false;
        snap.forEach((docSnap) => {
          const a = docSnap.data();
          if (a.password === password) {
            found = true;
            localStorage.setItem('adminLoggedIn', 'true');
            localStorage.setItem('adminUsername', a.username || username);
            localStorage.setItem('adminFullname', a.fullname || 'Admin');
            localStorage.setItem('accountType',   'admin');
            window.location.href = 'admin-dashboard.html';
          }
        });

        if (!found) {
          errEl.textContent = 'Incorrect admin password.';
          errEl.classList.remove('hidden');
        }
      } catch (err) {
        console.error(err);
        errEl.textContent = 'System Error: ' + err.message;
        errEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
